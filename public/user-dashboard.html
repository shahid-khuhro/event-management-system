<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Event Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2d3748;
        }
        header h1 { background: linear-gradient(135deg, #00d4ff, #0099cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #2d3748;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: #00d4ff; }
        .stat-card h3 { color: #00d4ff; margin-bottom: 10px; }
        .stat-card p { font-size: 36px; font-weight: bold; color: #fff; }
        .section {
            background: #0f172a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #2d3748;
        }
        .section h2 { color: #00d4ff; border-bottom: 2px solid #00d4ff; padding-bottom: 10px; margin-bottom: 20px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2d3748; }
        th { background: #1e293b; color: #00d4ff; }
        tr:hover { background: #1a2332; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ff4757, #c0392b); color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .logout-btn { background: linear-gradient(135deg, #ff4757, #c0392b); color: white; padding: 10px 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div><h1>🎯 Event Management System</h1><p>Welcome, <strong id="username"></strong>!</p></div>
            <button class="btn logout-btn" onclick="logout()">🚪 Logout</button>
        </header>
        <div class="stats-container">
            <div class="stat-card"><h3>📅 Available Events</h3><p id="totalEvents">0</p></div>
            <div class="stat-card"><h3>✅ My Registrations</h3><p id="myRegistrations">0</p></div>
        </div>
        <div class="section">
            <h2>📅 Available Events</h2>
            <table id="eventsTable"><thead><tr><th>Title</th><th>Date</th><th>Location</th><th>Organizer</th><th>Action</th></tr></thead><tbody id="eventsTableBody"></tbody></table>
        </div>
        <div class="section">
            <h2>✅ My Registered Events</h2>
            <table id="registrationsTable"><thead><tr><th>Event</th><th>Date</th><th>Location</th><th>Registered On</th><th>Action</th></tr></thead><tbody id="registrationsTableBody"></tbody></table>
        </div>
    </div>
    <script>
        async function checkSession() {
            const res = await fetch('/api/check-session');
            const data = await res.json();
            if (!data.loggedIn || data.user.role !== 'user') { window.location.href = 'choice.html'; return; }
            document.getElementById('username').textContent = data.user.username;
            loadData();
        }
        async function loadData() { await loadEvents(); await loadMyRegistrations(); await loadStats(); }
        async function loadEvents() {
            const res = await fetch('/api/events');
            const events = await res.json();
            document.getElementById('eventsTableBody').innerHTML = events.map(event => `<tr>
                <td>${event.Title}</td>
                <td>${new Date(event.Date).toLocaleDateString()}</td>
                <td>${event.Location}</td>
                <td>${event.Organizer}</td>
                <td><button class="btn btn-primary" onclick="registerForEvent(${event.EventID})">Register</button></td>
            </tr>`).join('');
        }
        async function loadMyRegistrations() {
            const res = await fetch('/api/my-registrations');
            const regs = await res.json();
            const tbody = document.getElementById('registrationsTableBody');
            if (regs.length === 0) { tbody.innerHTML = '<tr><td colspan="5">No registrations yet</td></tr>'; return; }
            tbody.innerHTML = regs.map(reg => `<tr>
                <td>${reg.EventTitle}</td>
                <td>${new Date(reg.Date).toLocaleDateString()}</td>
                <td>${reg.Location || 'N/A'}</td>
                <td>${new Date(reg.RegistrationDate).toLocaleDateString()}</td>
                <td><button class="btn btn-danger" onclick="cancelRegistration(${reg.RegistrationID})">Cancel</button></td>
            </tr>`).join('');
        }
        async function loadStats() {
            const res = await fetch('/api/stats');
            const stats = await res.json();
            document.getElementById('totalEvents').textContent = stats.totalEvents || 0;
            document.getElementById('myRegistrations').textContent = stats.myRegistrations || 0;
        }
        async function registerForEvent(eventId) {
            const res = await fetch('/api/register-for-event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ eventId }) });
            if (res.ok) { alert('✅ Registered!'); loadData(); } else { const err = await res.json(); alert('❌ ' + err.error); }
        }
        async function cancelRegistration(regId) {
            if (confirm('Cancel this registration?')) {
                const res = await fetch(`/api/cancel-registration/${regId}`, { method: 'DELETE' });
                if (res.ok) { alert('✅ Cancelled!'); loadData(); } else { alert('❌ Failed'); }
            }
        }
        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = 'choice.html'; }
        checkSession();
    </script>
</body>
</html>
