<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a2332 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #2d3748;
        }

        h1 {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
        }

        .choice-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .choice-btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        .admin-btn {
            background: linear-gradient(135deg, #ff4757, #c0392b);
            color: white;
            box-shadow: 0 4px 15px rgba(255,71,87,0.3);
        }

        .user-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }

        .choice-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .register-link {
            margin-top: 20px;
        }

        .register-link a {
            color: #00d4ff;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Event Management System</h1>
        <p class="subtitle">Choose your login type</p>
        
        <div class="choice-buttons">
            <button class="choice-btn admin-btn" onclick="location.href='login.html?role=admin'">
                👑 Admin Login
            </button>
            <button class="choice-btn user-btn" onclick="location.href='login.html?role=user'">
                👤 User Login
            </button>
        </div>
        
        <div class="register-link">
            <p>New user? <a href="register.html">Create an account</a></p>
        </div>
    </div>
</body>
</html>
